name: drag
description: "Drag — a cross-platform file-transfer client for Local, Amazon S3 and SFTP endpoints."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  crypto: ^3.0.7
  xml: ^7.0.1
  path: ^1.9.1
  sqflite_common_ffi: ^2.4.2
  dartssh2: ^2.21.0
  window_manager: ^0.5.1
  flutter_secure_storage: ^10.3.1
  desktop_drop: ^0.7.1
  local_notifier: ^0.1.6
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/drag.png
    - assets/icons/drag_256.png
    - assets/icons/drag_512.png
  fonts:
    # Roboto Condensed isn't in the google_fonts catalogue, so it ships as a
    # bundled asset and is resolved by family name (see FsType._resolve).
    - family: Roboto Condensed
      fonts:
        - asset: assets/fonts/RobotoCondensed.ttf
