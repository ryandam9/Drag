name: drag
description: "FileSync — a cross-platform SFTP/FTP file transfer client (UI implementation of the FileSync mockup)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  crypto: ^3.0.6
  xml: ^7.0.1
  path: ^1.9.1
  sqflite_common_ffi: ^2.4.2
  dartssh2: ^2.18.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/drag.png
    - assets/icons/drag_256.png
    - assets/icons/drag_512.png
