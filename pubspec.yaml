name: drag
description: "FileSync — a cross-platform SFTP/FTP file transfer client (UI implementation of the FileSync mockup)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  crypto: ^3.0.6
  xml: ^6.5.0
  path: ^1.9.1
  sqflite_common_ffi: ^2.4.2
  dartssh2: ^2.18.0
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/drag.png
    - assets/icons/drag_256.png
    - assets/icons/drag_512.png
