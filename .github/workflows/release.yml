name: Build & Release

# Produces packaged, downloadable Linux & macOS binaries.
#   • workflow_dispatch  → build on demand, available as workflow artifacts
#   • push of a v* tag   → also attach the archives to a GitHub Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Pin to the Flutter version the project is developed against.
env:
  FLUTTER_VERSION: "3.44.2"

# Needed so a tagged run can create/update the GitHub Release.
permissions:
  contents: write

jobs:
  # ── 🐧 Linux (x64) ──────────────────────────────────────────────
  linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - name: Build Linux release
        run: flutter build linux --release

      - name: Package bundle (tar.gz)
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/drag-linux-x64.tar.gz" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-linux-x64
          path: drag-linux-x64.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: drag-linux-x64.tar.gz

  # ── 🍎 macOS ────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # CocoaPods is preinstalled on GitHub macOS runners; guard just in case.
      - name: Ensure CocoaPods
        run: pod --version || sudo gem install cocoapods

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - name: Build macOS release
        run: flutter build macos --release

      - name: Package .app (zip, preserving bundle metadata)
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent Drag.app "$GITHUB_WORKSPACE/drag-macos.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-macos
          path: drag-macos.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: drag-macos.zip
