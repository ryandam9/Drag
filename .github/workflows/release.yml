name: Build & Release

# Produces packaged, downloadable Linux, macOS & Windows binaries.
#   • workflow_dispatch  → build on demand, available as workflow artifacts
#   • push of a v* tag   → also attach the archives to a GitHub Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Pin to the Flutter version the project is developed against.
env:
  FLUTTER_VERSION: "3.44.2"

# Needed so a tagged run can create/update the GitHub Release.
permissions:
  contents: write

jobs:
  # ── 🐧 Linux (x64) ──────────────────────────────────────────────
  linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libsqlite3-dev libsecret-1-dev libnotify-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - name: Build Linux release
        run: flutter build linux --release

      - name: Package bundle (tar.gz)
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/drag-linux-x64.tar.gz" .

      - name: Package installer (.deb)
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//; s/+.*//')
          chmod +x scripts/package-linux-deb.sh
          scripts/package-linux-deb.sh build/linux/x64/release/bundle "$VERSION" "$GITHUB_WORKSPACE/drag-linux-x64.deb"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-linux-x64
          path: |
            drag-linux-x64.tar.gz
            drag-linux-x64.deb
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            drag-linux-x64.tar.gz
            drag-linux-x64.deb

  # ── 🍎 macOS ────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # CocoaPods is preinstalled on GitHub macOS runners; guard just in case.
      - name: Ensure CocoaPods
        run: pod --version || sudo gem install cocoapods

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - name: Build macOS release
        run: flutter build macos --release

      - name: Package .app (zip, preserving bundle metadata)
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent Drag.app "$GITHUB_WORKSPACE/drag-macos.zip"

      # Unsigned .dmg. Signing + notarisation needs Apple Developer secrets
      # (see the packaging issue); the disk image itself installs by drag-to-
      # Applications, with a first-launch Gatekeeper prompt until signed.
      - name: Package installer (.dmg)
        run: |
          hdiutil create -volname Drag \
            -srcfolder "build/macos/Build/Products/Release/Drag.app" \
            -ov -format UDZO "$GITHUB_WORKSPACE/drag-macos.dmg"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-macos
          path: |
            drag-macos.zip
            drag-macos.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            drag-macos.zip
            drag-macos.dmg

  # ── 🪟 Windows (x64) ────────────────────────────────────────────
  windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Build Windows release
        run: flutter build windows --release

      # Portable zip of the runner output. A signed MSIX/Inno installer needs
      # a code-signing certificate (see the packaging issue); the zip runs by
      # unpacking and launching drag.exe.
      - name: Package portable zip
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath drag-windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-windows-x64
          path: drag-windows-x64.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: drag-windows-x64.zip
