name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Pin to the Flutter version the project is developed against.
env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # sqflite_common_ffi (history DB) loads libsqlite3 at runtime.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  build:
    name: Build ${{ matrix.platform }}
    needs: analyze-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: build/linux/x64/release/bundle
          - os: macos-latest
            platform: macos
            artifact: build/macos/Build/Products/Release
          - os: windows-latest
            platform: windows
            artifact: build/windows/x64/runner/Release
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libsqlite3-dev libsecret-1-dev libnotify-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Build ${{ matrix.platform }}
        run: flutter build ${{ matrix.platform }} --release

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
