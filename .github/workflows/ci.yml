name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Pin to the Flutter version the project is developed against.
env:
  FLUTTER_VERSION: "3.44.2"

# Only the newest run per branch/PR matters — cancel superseded ones so pushes
# in quick succession don't queue up redundant full CI runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # sqflite_common_ffi (history DB) loads libsqlite3 at runtime.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      # Formatting gate: fail (without rewriting anything) if any file isn't
      # `dart format` clean, so style drift can't land.
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Test (with coverage)
        run: flutter test --coverage
      - name: Enforce coverage floor
        run: |
          pct=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{ if (lf>0) printf "%.1f", (lh/lf)*100; else print "0" }' coverage/lcov.info)
          min=80.0
          echo "Line coverage: ${pct}% (floor ${min}%)"
          awk -v p="$pct" -v m="$min" 'BEGIN{ if (p+0 < m+0) { printf "::error::Line coverage %.1f%% is below the %.1f%% floor\n", p, m; exit 1 } }'

  # The full analyze/coverage gate runs once on Linux (above); this matrix
  # re-runs the plain test suite on the other two desktop targets to catch
  # OS-specific breakage (path separators, native SQLite loading, …).
  test:
    name: Test (${{ matrix.os }})
    needs: analyze-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # No native SQLite provisioning step needed here: the `sqlite3` Dart
      # package (v3.x, behind sqflite_common_ffi) ships a native-assets build
      # hook that fetches a prebuilt sqlite3 for the host OS during
      # `flutter test`, and macOS runners additionally have the system
      # libsqlite3.dylib as a fallback. If Windows ever fails to load sqlite3,
      # provision it with `choco install sqlite` and add its dir to $GITHUB_PATH.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Test
        run: flutter test

  sftp-integration:
    name: SFTP integration (containerized)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      # A throwaway SSH/SFTP server so the gated integration test exercises the
      # real SftpBackend end-to-end (connect/list/upload/download/rename/delete).
      - name: Start SFTP server
        run: |
          docker run -d --name sftp -p 2222:22 atmoz/sftp:alpine \
            sftptest:testpass123:::upload
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 2222; then echo "sftp up"; break; fi
            sleep 1
          done

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Run SFTP integration test
        run: |
          flutter test test/sftp_integration_test.dart \
            --dart-define=SFTP_HOST=127.0.0.1 \
            --dart-define=SFTP_PORT=2222 \
            --dart-define=SFTP_USER=sftptest \
            --dart-define=SFTP_PASS=testpass123 \
            --dart-define=SFTP_DIR=/upload

      - name: Stop SFTP server
        if: always()
        run: docker rm -f sftp

  s3-integration:
    name: S3 integration (containerized)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      # A throwaway MinIO server so the gated integration test exercises the
      # real hand-written S3Backend (SigV4 signing, upload/list/download,
      # cross-bucket copy, rename/delete) end-to-end over plain HTTP.
      - name: Start MinIO server
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9000/minio/health/live > /dev/null; then echo "minio up"; break; fi
            sleep 1
          done

      # The test expects two pre-existing buckets: S3_BUCKET for the round-trip
      # and file-op tests, S3_BUCKET2 for the cross-account copy test. Create
      # them with the mc client (run via docker so nothing is installed on the
      # runner; --network host so 127.0.0.1:9000 resolves to the MinIO above).
      - name: Create test buckets
        run: |
          docker run --rm --network host --entrypoint sh minio/mc -c \
            "mc alias set local http://127.0.0.1:9000 minioadmin minioadmin && \
             mc mb local/test-bucket local/test-bucket-b"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Run S3 integration test
        run: |
          flutter test test/s3_integration_test.dart \
            --dart-define=S3_ENDPOINT=127.0.0.1:9000 \
            --dart-define=S3_BUCKET=test-bucket \
            --dart-define=S3_BUCKET2=test-bucket-b \
            --dart-define=S3_KEY=minioadmin \
            --dart-define=S3_SECRET=minioadmin

      - name: Stop MinIO server
        if: always()
        run: docker rm -f minio

  build:
    name: Build ${{ matrix.platform }}
    needs: analyze-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: build/linux/x64/release/bundle
            package: drag-linux-x64.deb
          - os: macos-latest
            platform: macos
            artifact: build/macos/Build/Products/Release
            package: drag-macos.dmg
          - os: windows-latest
            platform: windows
            artifact: build/windows/x64/runner/Release
            package: drag-windows-x64.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libsqlite3-dev libsecret-1-dev libnotify-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Build ${{ matrix.platform }}
        run: flutter build ${{ matrix.platform }} --release

      # Exercise the packaging on every run so the scripts/commands can't
      # silently rot. These produce the same artifacts the release workflow
      # publishes (unsigned in CI — signing/notarisation happens on release).
      - name: Package .deb (Linux)
        if: matrix.platform == 'linux'
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//; s/+.*//')
          chmod +x scripts/package-linux-deb.sh
          scripts/package-linux-deb.sh build/linux/x64/release/bundle "$VERSION" drag-linux-x64.deb
          dpkg-deb -I drag-linux-x64.deb

      - name: Package .dmg (macOS)
        if: matrix.platform == 'macos'
        run: |
          hdiutil create -volname Drag \
            -srcfolder "build/macos/Build/Products/Release/Drag.app" \
            -ov -format UDZO drag-macos.dmg
          ls -lh drag-macos.dmg

      - name: Package portable zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath drag-windows-x64.zip -Force
          Get-Item drag-windows-x64.zip | Select-Object Name, Length

      - name: Upload ${{ matrix.platform }} build bundle
        uses: actions/upload-artifact@v7
        with:
          name: drag-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      # Also publish the generated, installable package so it can be downloaded
      # and inspected straight from a PR run — not just the raw build bundle.
      - name: Upload ${{ matrix.platform }} package
        uses: actions/upload-artifact@v7
        with:
          name: drag-${{ matrix.platform }}-package
          path: ${{ matrix.package }}
          if-no-files-found: error
